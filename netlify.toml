[build]
  command = "echo \"export const firebaseConfig = { apiKey: '$FIREBASE_API_KEY', authDomain: '$FIREBASE_AUTH_DOMAIN', projectId: '$FIREBASE_PROJECT_ID', storageBucket: '$FIREBASE_STORAGE_BUCKET', messagingSenderId: '$FIREBASE_MESSAGING_SENDER_ID', appId: '$FIREBASE_APP_ID' };\" > firebase-config.js"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
